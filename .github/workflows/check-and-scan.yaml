name: Check and Scan
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@govuk-one-login"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: |
          wget -q https://github.com/betterleaks/betterleaks/releases/download/v1.6.1/betterleaks_1.6.1_linux_x64.tar.gz
          tar -xzf betterleaks_1.6.1_linux_x64.tar.gz
          sudo mv betterleaks /usr/local/bin/
      - run: betterleaks git .
